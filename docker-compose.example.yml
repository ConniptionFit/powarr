version: "3.8"

# Copy this file to docker-compose.yml and fill in your own values.
# docker-compose.yml is gitignored because it contains the Postgres password.

services:
  powarr:
    build: .
    container_name: powarr
    ports:
      - "7979:7979"
    volumes:
      - /mnt/ServerFiles/Docker/powarr:/config
    restart: unless-stopped
    environment:
      - POWARR_DATA_DIR=/config
      # Set to your Postgres connection string. Omit entirely to use the SQLite fallback.
      - POWARR_DB_URL=postgresql://powarr:CHANGE_ME@postgres:5432/powarr
    networks:
      - default
      - postgres_net  # the network your existing postgres container is on

networks:
  postgres_net:
    external: true
    name: postgres_net  # replace with your actual postgres network name
